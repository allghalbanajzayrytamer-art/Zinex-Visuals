<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ZINEX | Amine OV Portfolio</title>
    <meta name="description" content="ZINEX | Portfolio - المصمم والمطور الإبداعي أمين">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://allghalbanajzayrytamer-art.github.io/Store-zinex/">
    <meta property="og:title" content="ZINEX | Amine OV Portfolio">
    <meta property="og:description" content="استكشف عالم التصميم السينمائي والفخامة الرقمية مع Amine OV.">
    <meta property="og:image" content="https://allghalbanajzayrytamer-art.github.io/Store-zinex/amine-profile.jpg">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://allghalbanajzayrytamer-art.github.io/Store-zinex/">
    <meta property="twitter:title" content="ZINEX | Amine OV Portfolio">
    <meta property="twitter:image" content="https://allghalbanajzayrytamer-art.github.io/Store-zinex/amine-profile.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --dark: #050505;
            --gray: #a8a8a8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* NAVIGATION */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .logo { color: var(--gold); font-weight: bold; letter-spacing: 4px; font-size: 1.2rem; text-transform: uppercase; }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.6), var(--dark)),
                        url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(50px, 10vw, 100px);
            letter-spacing: 10px;
            animation: fadeUp 1.5s ease-out;
        }

        /* ABOUT SECTION */
        .about {
            padding: 120px 10%;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 60px;
            background: #080808;
        }

        .about-image { flex: 1; min-width: 300px; }
        .about-image img {
            width: 100%;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transition: 0.5s;
        }

        .about-text { flex: 1.2; min-width: 300px; }
        .about-text h2 { font-family: 'Playfair Display'; font-size: 45px; margin: 15px 0; }

        .btn {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--gold);
            text-decoration: none;
            color: white;
            transition: 0.4s;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 20px;
        }

        .btn:hover { background: var(--gold); color: black; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .about { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">ZINEX</div>
    <div style="font-weight: 300; font-size: 12px; letter-spacing: 2px;">AMINE OV</div>
</nav>

<section class="hero">
    <div class="hero-content">
        <p style="letter-spacing: 5px; opacity: 0.7;">CREATIVE DIGITAL ARCHITECT</p>
        <h1>ZINEX</h1>
        <a href="#about" class="btn">اكتشف المزيد</a>
    </div>
</section>

<section id="about" class="about">
    <div class="about-image">
        <img src="amine-profile.jpg" alt="Amine OV Portfolio">
    </div>

    <div class="about-text">
        <span style="color: var(--gold); letter-spacing: 3px;">الرؤية الإبداعية</span>
        <h2>Amine OV</h2>
        <p style="color: var(--gray); font-size: 18px;">
            مصمم ومطور ويب متخصص في بناء واجهات رقمية فاخرة تعكس الهوية البصرية بأعلى معايير الدقة والجمال السينمائي.
        </p>
        <div style="display: flex; gap: 20px;">
            <a href="gallery.html" class="btn">معرض الأعمال</a>
            <a href="https://wa.me/213000000000" class="btn" style="border-color: #25D366;">تواصل واتساب</a>
        </div>
    </div>
</section>

<footer style="padding: 50px; text-align: center; border-top: 1px solid #111;">
    <p style="font-size: 10px; opacity: 0.4; letter-spacing: 2px;">© 2026 ZINEX STUDIO | BY AMINE OV</p>
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Amine OV Portfolio</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/allghalbanajzayrytamer-art/Zinex-Visuals/main/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --gray: #a8a8a8; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; line-height: 1.6; overflow-x: hidden; }

        /* Navigation */
        nav { 
            position: fixed; top: 0; width: 100%; padding: 20px 6%; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(15px); z-index: 1000; 
        }
        .nav-left { display: flex; align-items: center; gap: 15px; }
        .logo-img { height: 35px; }
        .by-text { font-size: 8px; color: var(--gray); letter-spacing: 2px; }
        .btn-gallery { color: var(--gold); text-decoration: none; font-size: 10px; font-weight: 700; letter-spacing: 1px; }

        /* Hero Section - تصميم مطابق للصورة */
        .hero { 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center; 
            background: url('https://raw.githubusercontent.com/allghalbanajzayrytamer-art/Zinex-Visuals/main/1000013306.jpg') no-repeat center center/cover;
            position: relative;
        }
        .hero::before { 
            content: ''; position: absolute; inset: 0; 
            background: rgba(0, 0, 0, 0.4); /* تظليل خفيف لبروز النص */
        }
        .hero-content { position: relative; z-index: 2; width: 100%; }
        .hero-logo { height: 70px; margin-bottom: 30px; }
        .slogan { 
            font-size: 10px; color: white; letter-spacing: 6px; 
            text-transform: uppercase; margin-bottom: 20px; display: block; opacity: 0.9;
        }
        .hero-title { 
            font-family: 'Playfair Display', serif; font-size: clamp(60px, 15vw, 120px); 
            color: white; margin-bottom: 50px; text-transform: uppercase; font-weight: 900;
        }
        .btn-explore { 
            border: 1.5px solid white; color: white; padding: 18px 45px; 
            text-decoration: none; font-size: 11px; font-weight: 400; 
            letter-spacing: 4px; text-transform: uppercase; transition: 0.4s;
        }
        .btn-explore:hover { background: white; color: black; }

        /* باقي الأقسام منظمين */
        .section-container { padding: 100px 10%; }
        .about-flex { display: flex; align-items: center; gap: 50px; flex-wrap: wrap; }
        .about-img { width: 300px; height: 400px; object-fit: cover; border: 1px solid var(--gold); }
        .contact-btns { display: flex; gap: 15px; margin-top: 30px; }
        .btn-s { padding: 12px 25px; font-size: 10px; text-decoration: none; font-weight: 700; border-radius: 4px; }
        
        footer { padding: 40px; text-align: center; opacity: 0.3; font-size: 9px; letter-spacing: 2px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <img src="logo.png" alt="ZINEX" class="logo-img">
        <span class="by-text">BY AMINE OV</span>
    </div>
    <a href="./gallery.html" class="btn-gallery">GALLERY</a>
</nav>

<section class="hero">
    <div class="hero-content">
        <img src="logo.png" alt="ZX" class="hero-logo">
        <span class="slogan">Visionary Visuals & Digital Code</span>
        <h1 class="hero-title">ZINEX</h1>
        <a href="#about" class="btn-explore">Explore Expertise</a>
    </div>
</section>

<section id="about" class="section-container" style="background:#080808;">
    <div class="about-flex">
        <img src="amine-profile.jpg" alt="Amine" class="about-img">
        <div>
            <h2 style="color:var(--gold); font-family:'Playfair Display'; font-size:35px; margin-bottom:20px;">About Me</h2>
            <p>أنا أمين، متخصص في دمج الفن البصري مع لغة البرمجة. أسعى لتحويل كل مشروع إلى بصمة فنية فريدة.</p>
            <div class="contact-btns">
                <a href="https://wa.me/213663190202" class="btn-s" style="border:1px solid #25D366; color:#25D366;">WHATSAPP</a>
                <a href="https://www.facebook.com/amine.ov.visuals" class="btn-s" style="border:1px solid #1877F2; color:#1877F2;">FACEBOOK</a>
            </div>
        </div>
    </div>
</section>

<footer>© 2026 ZINEX STUDIO | DESIGNED BY AMINE OV</footer>

</body>
</html>

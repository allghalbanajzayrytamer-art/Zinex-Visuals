<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Amine OV Portfolio</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://allghalbanajzayrytamer-art.github.io/Zinex-Visuals/">
    <meta property="og:title" content="ZINEX | Amine OV Portfolio">
    <meta property="og:description" content="تجسيد الفخامة الرقمية.. دمج الفن السينمائي مع البرمجة الاحترافية. استكشف أعمال Amine OV.">
    
    <meta property="og:image" content="https://raw.githubusercontent.com/allghalbanajzayrytamer-art/Zinex-Visuals/main/amine-profile.jpg">
    <meta property="og:image:secure_url" content="https://raw.githubusercontent.com/allghalbanajzayrytamer-art/Zinex-Visuals/main/amine-profile.jpg">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://raw.githubusercontent.com/allghalbanajzayrytamer-art/Zinex-Visuals/main/amine-profile.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --gray: #a8a8a8; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; line-height: 1.6; }
        nav { position: fixed; top: 0; width: 100%; padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .logo-img { height: 35px; width: auto; }
        .hero { height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #111 0%, #050505 100%); }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(50px, 10vw, 90px); letter-spacing: 12px; color: white; text-transform: uppercase; }
        .portfolio { padding: 100px 8%; background: var(--dark); }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-top: 50px; }
        .video-card { background: #0a0a0a; border: 1px solid rgba(212, 175, 55, 0.05); border-radius: 4px; overflow: hidden; transition: 0.5s; cursor: pointer; }
        .video-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .video-card img { width: 100%; height: 200px; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .video-card:hover img { opacity: 1; }
        .btn-premium { padding: 12px 30px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; transition: 0.4s; }
        .btn-premium:hover { background: var(--gold); color: black; }
        footer { padding: 60px; text-align: center; opacity: 0.3; font-size: 10px; letter-spacing: 2px; }
    </style>
</head>
<body>
<nav>
    <img src="logo.png" alt="ZINEX" class="logo-img">
    <div style="font-weight: 300; font-size: 10px; letter-spacing: 2px; color: var(--gold);">AMINE OV | CREATIVE ARCHITECT</div>
</nav>

<section class="hero">
    <div class="hero-content">
        <p style="letter-spacing: 8px; opacity: 0.5; margin-bottom: 20px; font-size: 10px;">PREMIUM VISUAL EXPERIENCE</p>
        <h1>ZINEX</h1>
        <div style="margin-top: 40px;">
            <a href="#portfolio" class="btn-premium">View Work</a>
        </div>
    </div>
</section>

<section id="portfolio" class="portfolio">
    <h2 style="font-family: 'Playfair Display', serif; font-size: 30px; text-align: center;">Latest Creations</h2>
    <div id="youtube-portfolio" class="video-grid">
        <p style="text-align: center; grid-column: 1/-1; opacity: 0.5;">Loading Cinema...</p>
    </div>
</section>

<footer>© 2026 ZINEX STUDIO | CRAFTED BY AMINE OV</footer>

<script>
    const API_KEY = 'AIzaSyALMuJtd_5zQCji0gVRqHkr2ckiCdngECs'; 
    const CHANNEL_ID = 'UCmP8f6_Y6XoDozv8vS_2X_w';

    async function fetchVideos() {
        const container = document.getElementById('youtube-portfolio');
        try {
            const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=6&type=video`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.items) {
                container.innerHTML = '';
                data.items.forEach(item => {
                    container.innerHTML += `
                        <div class="video-card" onclick="window.open('https://www.youtube.com/watch?v=${item.id.videoId}', '_blank')">
                            <img src="${item.snippet.thumbnails.high.url}">
                            <h3 style="padding:20px; font-size:12px; font-weight:400; text-align:right;">${item.snippet.title}</h3>
                        </div>`;
                });
            }
        } catch (e) { console.log(e); }
    }
    document.addEventListener('DOMContentLoaded', fetchVideos);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>ZINEX | Amine OV Portfolio</title>
    <meta name="description" content="ZINEX | Portfolio - المصمم والمطور الإبداعي أمين">

    <meta property="og:title" content="ZINEX | Amine OV Portfolio">
    <meta property="og:description" content="تجسيد الفخامة في كل بكسل. اكتشف الرؤية الإبداعية لأمين.">
    <meta property="og:image" content="https://amineov.github.io/Zinex-Visuals/amine-profile.jpg">
    <meta property="og:url" content="https://amineov.github.io/Zinex-Visuals/">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/jpeg" href="amine-profile.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <style>
        /* ... (نفس كود التنسيق CSS السابق) ... */
        :root {
            --gold: #d4af37;
            --dark: #050505;
            --gray: #a8a8a8;
            --fb-blue: #1877F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: white;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* NAVIGATION */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .logo { color: var(--gold); font-weight: bold; letter-spacing: 4px; font-size: 1.2rem; text-transform: uppercase; }

        /* HERO SECTION WITH VIDEO */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        .back-video {
            position: absolute;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.3);
        }

        .hero-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(50px, 10vw, 100px);
            letter-spacing: 10px;
            animation: fadeUp 1.5s ease-out;
        }

        /* ABOUT SECTION */
        .about {
            padding: 120px 10%;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 60px;
            background: #080808;
        }

        .about-image { flex: 1; min-width: 300px; }
        .about-image img {
            width: 100%;
            border-radius: 4px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .about-text { flex: 1.2; min-width: 300px; }
        
        /* الأزرار المحدثة (التحفة) */
        .cta-container {
            display: flex;
            gap: 15px;
            margin-top: 45px;
            flex-wrap: wrap;
        }

        .premium-btn {
            position: relative;
            padding: 14px 28px;
            text-decoration: none;
            color: white;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            transition: 0.5s all cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 4px;
        }

        /* زر الرؤية (الذهبي المميز) */
        .btn-vision {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
            color: var(--gold);
            flex: 1 1 100%; /* اجعل زر الرؤية عريضاً في البداية */
            margin-bottom: 5px;
            font-size: 13px;
        }

        .btn-vision:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            transform: translateY(-5px);
        }

        /* زر الفيسبوك */
        .btn-fb {
            border-color: #1877F2;
            color: #1877F2;
            flex: 1;
        }

        .btn-fb:hover {
            background: #1877F2;
            color: white;
            box-shadow: 0 0 20px rgba(24, 119, 242, 0.3);
            transform: translateY(-5px);
        }

        /* زر الواتساب */
        .btn-wa {
            border-color: #25D366;
            color: #25D366;
            flex: 1;
        }

        .btn-wa:hover {
            background: #25D366;
            color: white;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.3);
            transform: translateY(-5px);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .about { flex-direction: column; text-align: center; }
            .cta-container { justify-content: center; }
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">ZINEX</div>
    <div style="font-weight: 300; font-size: 11px; letter-spacing: 2px;">AMINE OV</div>
</nav>

<section class="hero">
    <video autoplay loop muted playsinline class="back-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-star-wars-style-text-scrolling-in-deep-space-34135-large.mp4" type="video/mp4">
    </video>
    
    <div class="hero-content">
        <p style="letter-spacing: 5px; opacity: 0.7;">CREATIVE DIGITAL ARCHITECT</p>
        <h1>ZINEX</h1>
        <a href="#about" class="premium-btn btn-vision" style="flex: none; width: auto; padding: 15px 40px;">اكتشف القصة</a>
    </div>
</section>

<section id="about" class="about">
    <div class="about-image">
        <img src="amine-profile.jpg" alt="Amine OV Portfolio">
    </div>

    <div class="about-text">
        <span style="color: var(--gold); letter-spacing: 4px; font-weight: 300; font-size: 12px;">EST. 2026</span>
        <h2 style="font-family: 'Playfair Display', serif; font-size: clamp(35px, 5vw, 55px); line-height: 1.2; margin: 20px 0;">
            تجسيد الفخامة <br> في كل بكسل.
        </h2>
        <p style="color: var(--gray); font-size: 17px; max-width: 500px; font-weight: 300; line-height: 1.8;">
            أنا أمين، متخصص في صياغة التجارب الرقمية الفريدة. هنا، ندمج الفن السينمائي مع قوة التكنولوجيا لنخلق بصمة لا تُنسى.
        </p>
        
        <div class="cta-container">
            <a href="gallery.html" class="premium-btn btn-vision">استكشف الرؤية</a>
            <a href="https://www.facebook.com/share/1B8VoM4pHn/" class="premium-btn btn-fb" target="_blank">Facebook</a>
            <a href="https://wa.me/213663190202" class="premium-btn btn-wa" target="_blank">WhatsApp</a>
        </div>
    </div>
</section>

<footer style="padding: 50px; text-align: center; border-top: 1px solid #111;">
    <p style="font-size: 10px; opacity: 0.4; letter-spacing: 2px;">© 2026 ZINEX STUDIO | BEYOND VISUALS</p>
</footer>

</body>
</html>

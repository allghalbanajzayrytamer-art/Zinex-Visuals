<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Amine OV</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --dark: #050505;
            --gray: #a8a8a8;
            --whatsapp: #25D366;
            --facebook: #1877F2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; overflow-x: hidden; }

        nav {
            position: fixed; top: 0; width: 100%; padding: 15px 6%;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        .logo-img { height: 40px; width: auto; }

        .hero { height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; position: relative; overflow: hidden; }
        .back-video { position: absolute; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; filter: brightness(0.3); }
        
        .about { padding: 120px 10%; display: flex; align-items: center; flex-wrap: wrap; gap: 60px; background: #080808; }
        .about-image img { width: 100%; border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 2px; }

        /* الأزرار التحفة - تصميم متكامل */
        .cta-container {
            display: flex;
            gap: 15px;
            margin-top: 45px;
            flex-wrap: wrap;
        }

        .premium-btn {
            position: relative;
            padding: 14px 28px;
            text-decoration: none;
            color: white;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 600;
            transition: 0.5s all cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 4px;
        }

        /* زر الرؤية (الذهبي المميز) */
        .btn-vision {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.08);
            color: var(--gold);
            flex: 1 1 100%; /* اجعل زر الرؤية عريضاً في البداية */
            margin-bottom: 5px;
            font-size: 13px;
        }

        .btn-vision:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
            transform: translateY(-5px);
        }

        /* زر الفيسبوك */
        .btn-fb {
            border-color: var(--facebook);
            color: var(--facebook);
            flex: 1;
        }

        .btn-fb:hover {
            background: var(--facebook);
            color: white;
            box-shadow: 0 0 20px rgba(24, 119, 242, 0.3);
            transform: translateY(-5px);
        }

        /* زر الواتساب */
        .btn-wa {
            border-color: var(--whatsapp);
            color: var(--whatsapp);
            flex: 1;
        }

        .btn-wa:hover {
            background: var(--whatsapp);
            color: white;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.3);
            transform: translateY(-5px);
        }

        @media (max-width: 768px) {
            .about { flex-direction: column; text-align: center; }
            .cta-container { justify-content: center; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html"><img src="logo.png" alt="ZINEX" class="logo-img"></a>
    <div style="font-weight: 300; font-size: 11px; letter-spacing: 2px; color: var(--gold);">ZINEX VISUALS</div>
</nav>

<section class="hero">
    <video autoplay loop muted playsinline class="back-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-star-wars-style-text-scrolling-in-deep-space-34135-large.mp4" type="video/mp4">
    </video>
    <div class="hero-content">
        <p style="letter-spacing: 5px; opacity: 0.6; font-size: 12px;">CREATIVE DIGITAL ARCHITECT</p>
        <h1 style="font-family: 'Playfair Display', serif; font-size: clamp(50px, 10vw, 90px); color: var(--gold); margin: 15px 0;">ZINEX</h1>
        <a href="#about" class="premium-btn btn-vision" style="flex: none; width: auto; padding: 15px 40px;">اكتشف القصة</a>
    </div>
</section>

<section id="about" class="about">
    <div class="about-image" style="flex: 1; min-width: 300px;">
        <img src="amine-profile.jpg" alt="Amine OV">
    </div>

    <div class="about-text" style="flex: 1.2; min-width: 300px;">
        <span style="color: var(--gold); letter-spacing: 4px; font-size: 11px;">EST. 2026</span>
        <h2 style="font-family: 'Playfair Display', serif; font-size: clamp(35px, 5vw, 50px); margin: 20px 0;">تجسيد الفخامة<br>في كل بكسل.</h2>
        <p style="color: var(--gray); font-size: 16px; font-weight: 300; line-height: 1.8;">
            أنا أمين، متخصص في صياغة التجارب الرقمية الفريدة. هنا، ندمج الفن السينمائي مع قوة التكنولوجيا لنخلق بصمة لا تُنسى.
        </p>
        
        <div class="cta-container">
            <a href="gallery.html" class="premium-btn btn-vision">استكشف الرؤية</a>
            <a href="https://www.facebook.com/share/1B8VoM4pHn/" class="premium-btn btn-fb" target="_blank">Facebook</a>
            <a href="https://wa.me/213663190202" class="premium-btn btn-wa" target="_blank">WhatsApp</a>
        </div>
    </div>
</section>

<footer style="padding: 60px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05);">
    <img src="logo.png" alt="ZINEX" style="height: 35px; opacity: 0.6; margin-bottom: 20px;">
    <p style="font-size: 9px; opacity: 0.3; letter-spacing: 3px;">© 2026 ZINEX STUDIO | BY AMINE OV</p>
</footer>

</body>
</html>

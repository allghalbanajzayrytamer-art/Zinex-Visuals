<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Amine OV Portfolio</title>
    
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://allghalbanajzayrytamer-art.github.io/Zinex-Visuals/">
    <meta property="og:title" content="ZINEX | Amine OV Portfolio">
    <meta property="og:description" content="تجسيد الفخامة الرقمية.. دمج الفن السينمائي مع البرمجة الاحترافية. استكشف أعمال Amine OV.">
    <meta property="og:image" content="https://raw.githubusercontent.com/allghalbanajzayrytamer-art/Zinex-Visuals/main/amine-profile.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; line-height: 1.6; overflow-x: hidden; }
        nav { position: fixed; top: 0; width: 100%; padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .logo-img { height: 35px; width: auto; }
        .hero { height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle, #111 0%, #050505 100%); }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(50px, 10vw, 90px); letter-spacing: 10px; margin-bottom: 20px; }
        .portfolio { padding: 100px 8%; background: var(--dark); }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 50px; }
        .video-card { background: #0a0a0a; border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 4px; overflow: hidden; transition: 0.4s; cursor: pointer; }
        .video-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .video-card img { width: 100%; height: 200px; object-fit: cover; opacity: 0.8; }
        .btn-premium { padding: 12px 25px; text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; border-radius: 4px; transition: 0.4s; display: inline-block; margin: 10px; }
        .btn-gold { border: 1px solid var(--gold); color: var(--gold); }
        .btn-gold:hover { background: var(--gold); color: black; }
        .btn-wa { border: 1px solid #25D366; color: #25D366; }
        .btn-fb { border: 1px solid #1877F2; color: #1877F2; }
        footer { padding: 40px; text-align: center; opacity: 0.3; font-size: 10px; }
    </style>
</head>
<body>
<nav>
    <a href="./index.html"><img src="logo.png" alt="ZINEX" class="logo-img"></a>
    <div style="font-weight: 300; font-size: 10px; letter-spacing: 2px; color: var(--gold);">AMINE OV | CREATIVE DIRECTOR</div>
</nav>

<section class="hero">
    <div class="hero-content">
        <p style="letter-spacing: 5px; opacity: 0.5; margin-bottom: 20px;">PREMIUM DIGITAL EXPERIENCE</p>
        <h1>ZINEX</h1>
        <div style="margin-top: 30px;">
            <a href="#portfolio" class="btn-premium btn-gold">استكشف الأعمال</a>
            <a href="./gallery.html" class="btn-premium" style="border: 1px solid white; color: white;">المعرض الكامل</a>
        </div>
    </div>
</section>

<section id="portfolio" class="portfolio">
    <h2 style="font-family: 'Playfair Display', serif; font-size: 35px; text-align: center; margin-bottom: 40px;">أحدث الإبداعات</h2>
    <div id="youtube-portfolio" class="video-grid">
        <p style="text-align: center; grid-column: 1/-1;">جاري تحميل المحتوى السينمائي...</p>
    </div>
</section>

<section style="padding: 80px 10%; text-align: center; background: #080808; border-top: 1px solid rgba(212, 175, 55, 0.1);">
    <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 30px;">تواصل معي</h2>
    <a href="https://wa.me/213663190202" target="_blank" class="btn-premium btn-wa">WhatsApp</a>
    <a href="https://www.facebook.com/amine.ov.visuals" target="_blank" class="btn-premium btn-fb">Facebook</a>
</section>

<footer>© 2026 ZINEX STUDIO | BY AMINE OV</footer>

<script>
    const API_KEY = 'AIzaSyALMuJtd_5zQCji0gVRqHkr2ckiCdngECs'; 
    const CHANNEL_ID = 'UCmP8f6_Y6XoDozv8vS_2X_w';

    async function fetchVideos() {
        const container = document.getElementById('youtube-portfolio');
        try {
            const url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=6&type=video`;
            const res = await fetch(url);
            const data = await res.json();
            if (data.items && data.items.length > 0) {
                container.innerHTML = '';
                data.items.forEach(item => {
                    if(item.id.videoId) {
                        container.innerHTML += `
                        <div class="video-card" onclick="window.open('https://www.youtube.com/watch?v=${item.id.videoId}', '_blank')">
                            <img src="${item.snippet.thumbnails.high.url}">
                            <h3 style="padding:15px; font-size:11px; text-align:right;">${item.snippet.title}</h3>
                        </div>`;
                    }
                });
            } else {
                container.innerHTML = '<p>لا توجد فيديوهات متاحة حالياً.</p>';
            }
        } catch (e) { container.innerHTML = '<p>حدث خطأ في تحميل الفيديوهات.</p>'; }
    }
    document.addEventListener('DOMContentLoaded', fetchVideos);
</script>
</body>
</html>

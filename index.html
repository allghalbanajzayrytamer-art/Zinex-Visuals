<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Amine OV Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #050505; --gray: #a8a8a8; --wa: #25D366; --fb: #1877F2; }
        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
        body { font-family: 'Montserrat', sans-serif; background: var(--dark); color: white; overflow-x: hidden; line-height: 1.6; }
        nav { position: fixed; top: 0; width: 100%; padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .logo-img { height: 40px; width: auto; }
        .hero { position: relative; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; overflow: hidden; }
        .back-video { position: absolute; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; object-fit: cover; filter: brightness(0.3); }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(50px, 10vw, 100px); letter-spacing: 10px; margin-bottom: 20px; }
        .cta-container { display: flex; gap: 15px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
        .premium-btn { padding: 12px 25px; text-decoration: none; color: white; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 4px; transition: 0.4s; }
        .btn-vision { border-color: var(--gold); color: var(--gold); }
        .btn-vision:hover { background: var(--gold); color: black; }
        .about { padding: 120px 10%; display: flex; align-items: center; flex-wrap: wrap; gap: 60px; background: #080808; }
        .about-image img { width: 100%; max-width: 380px; border-radius: 8px; border: 1px solid rgba(212, 175, 55, 0.2); filter: grayscale(20%); transition: 0.5s; }
        .about-image img:hover { filter: grayscale(0%); border-color: var(--gold); }
        .portfolio { padding: 100px 10%; text-align: center; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 50px; }
        .video-card { background: #0f0f0f; border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 8px; overflow: hidden; transition: 0.4s; }
        .video-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .video-card img { width: 100%; display: block; }
        footer { padding: 50px; text-align: center; opacity: 0.4; font-size: 10px; }
    </style>
</head>
<body>
<nav>
    <a href="index.html"><img src="logo.png" alt="ZINEX" class="logo-img"></a>
    <div style="font-weight: 300; font-size: 10px; letter-spacing: 2px; color: var(--gold);">AMINE OV</div>
</nav>
<section class="hero">
    <video autoplay loop muted playsinline class="back-video"><source src="https://assets.mixkit.co/videos/preview/mixkit-star-wars-style-text-scrolling-in-deep-space-34135-large.mp4" type="video/mp4"></video>
    <div class="hero-content">
        <p style="letter-spacing: 5px; opacity: 0.7;">CREATIVE DIGITAL ARCHITECT</p>
        <h1>ZINEX</h1>
        <div class="cta-container">
            <a href="#portfolio" class="premium-btn btn-vision">استكشف الرؤية</a>
            <a href="gallery.html" class="premium-btn">المعرض الكامل</a>
        </div>
    </div>
</section>
<section id="about" class="about">
    <div class="about-image"><img src="amine-profile.jpg" alt="Amine OV"></div>
    <div class="about-text">
        <h2 style="font-family: 'Playfair Display', serif; font-size: 45px; margin-bottom: 20px;">تجسيد الفخامة.</h2>
        <p style="color: var(--gray); margin-bottom: 30px;">أنا أمين، متخصص في صياغة التجارب الرقمية الفريدة ودمج الفن السينمائي مع البرمجة.</p>
        <div class="cta-container" style="justify-content: flex-start;">
            <a href="https://wa.me/213663190202" target="_blank" class="premium-btn" style="border-color: var(--wa); color: var(--wa);">WhatsApp</a>
            <a href="https://www.facebook.com/share/1B8VoM4pHn/" target="_blank" class="premium-btn" style="border-color: var(--fb); color: var(--fb);">Facebook</a>
        </div>
    </div>
</section>
<section id="portfolio" class="portfolio">
    <h2 style="font-family: 'Playfair Display', serif; font-size: 35px;">أحدث الإبداعات</h2>
    <div id="youtube-portfolio" class="video-grid"><p>جاري التحميل...</p></div>
</section>
<footer>© 2026 ZINEX STUDIO</footer>

<script>
    const API_KEY = 'AIzaSyALMuJtd_5zQCji0gVRqHkr2ckiCdngECs';
    const CHANNEL_ID = 'UCvN66_Tlsm2vY_R_1M-W96w';

    async function fetchVideos() {
        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=6&type=video`);
            const data = await res.json();
            const container = document.getElementById('youtube-portfolio');
            
            if (data.items) {
                container.innerHTML = '';
                data.items.forEach(item => {
                    container.innerHTML += `
                        <div class="video-card">
                            <a href="https://www.youtube.com/watch?v=${item.id.videoId}" target="_blank">
                                <img src="${item.snippet.thumbnails.high.url}">
                            </a>
                            <h3 style="padding:15px; font-size:12px;">${item.snippet.title}</h3>
                        </div>`;
                });
            } else {
                container.innerHTML = '<p>لا توجد فيديوهات حالياً.</p>';
            }
        } catch (e) { 
            console.error(e); 
            document.getElementById('youtube-portfolio').innerHTML = '<p>خطأ في تحميل الفيديوهات.</p>';
        }
    }
    fetchVideos();
</script>
</body>
</html>

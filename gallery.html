<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Full Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; }
        nav { padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; background: rgba(5,5,5,0.9); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(212,175,55,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 40px 8%; }
        .grid-item { position: relative; background: #111; height: 350px; cursor: pointer; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; filter: brightness(0.6); }
        .grid-item:hover img { transform: scale(1.1); filter: brightness(1); }
        .overlay { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, black); text-align: right; }
    </style>
</head>
<body>
<nav>
    <a href="./index.html"><img src="logo.png" alt="ZINEX" style="height:35px;"></a>
    <a href="./index.html" style="color:var(--gold); text-decoration:none; font-size:10px; letter-spacing:2px;">العودة للرئيسية</a>
</nav>

<div style="padding: 60px 10% 20px; text-align: center;">
    <h1 style="font-family: 'Playfair Display', serif; font-size: 40px; color: var(--gold);">الأرشيف الكامل</h1>
</div>

<div id="gallery-grid" class="grid"></div>

<script>
    const API_KEY = 'AIzaSyALMuJtd_5zQCji0gVRqHkr2ckiCdngECs';
    const CHANNEL_ID = 'UCmP8f6_Y6XoDozv8vS_2X_w';

    async function loadGallery() {
        const container = document.getElementById('gallery-grid');
        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=50&type=video`);
            const data = await res.json();
            if (data.items) {
                container.innerHTML = '';
                data.items.forEach(item => {
                    if(item.id.videoId) {
                        container.innerHTML += `
                        <div class="grid-item" onclick="window.open('https://www.youtube.com/watch?v=${item.id.videoId}', '_blank')">
                            <img src="${item.snippet.thumbnails.high.url}">
                            <div class="overlay"><h3 style="font-size:12px;">${item.snippet.title}</h3></div>
                        </div>`;
                    }
                });
            }
        } catch (e) { console.log(e); }
    }
    window.onload = loadGallery;
</script>
</body>
</html>

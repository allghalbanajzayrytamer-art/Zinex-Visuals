<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive | ZINEX Visuals</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --dark: #050505;
            --gray: #a8a8a8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--dark);
            color: white;
            line-height: 1.6;
        }

        nav {
            padding: 30px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }

        .logo { 
            color: var(--gold); 
            text-decoration: none;
            font-weight: bold; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
        }

        .gallery-header {
            padding: 80px 10% 40px;
            text-align: center;
        }

        .gallery-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 50px;
            margin-bottom: 10px;
        }

        /* شبكة الصور */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 40px 10%;
        }

        .grid-item {
            position: relative;
            aspect-ratio: 4/5;
            overflow: hidden;
            background: #111;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.8s cubic-bezier(0.2, 1, 0.3, 1);
            filter: grayscale(100%) brightness(0.7);
        }

        .grid-item:hover img {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.05);
        }

        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--gold);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 5px;
        }

        footer {
            padding: 60px;
            text-align: center;
            opacity: 0.4;
            font-size: 10px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">ZINEX</a>
    <div style="font-weight: 300; font-size: 11px;">ARCHIVE</div>
</nav>

<div class="gallery-header">
    <span style="color: var(--gold); letter-spacing: 5px; font-size: 12px;">VISUAL JOURNEY</span>
    <h1>معرض الأعمال</h1>
    <p style="color: var(--gray); font-weight: 300;">مجموعة مختارة من المشاريع والرؤى البصرية.</p>
</div>

<div class="grid">
    <div class="grid-item">
        <img src="amine-profile.jpg" alt="Work 1">
    </div>
    <div class="grid-item">
        <img src="https://images.unsplash.com/photo-1492691523567-6172152e0dd6?q=80&w=600" alt="Work 2">
    </div>
    <div class="grid-item">
        <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=600" alt="Work 3">
    </div>
</div>

<center>
    <a href="index.html" class="back-link">العودة للرئيسية</a>
</center>

<footer>
    © 2026 ZINEX STUDIO | BY AMINE OV
</footer>

</body>
</html>

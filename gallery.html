<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZINEX | Archive Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #d4af37; 
            --bg: #050505; 
            --card-bg: rgba(255,255,255,0.02);
        }

        * { margin:0; padding:0; box-sizing:border-box; scroll-behavior: smooth; }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Montserrat', sans-serif; 
            padding: 40px 5%; 
        }

        /* Header */
        header { text-align: center; margin-bottom: 80px; margin-top: 40px; }
        header h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: clamp(40px, 8vw, 60px); 
            letter-spacing: 15px; 
            color: var(--gold);
            text-transform: uppercase;
        }
        header p { opacity: 0.5; letter-spacing: 5px; font-size: 12px; margin-top: 15px; }

        /* Grid System */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            position: relative;
            overflow: hidden;
            aspect-ratio: 3 / 4; /* توحيد حجم الصور */
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .card img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.6); /* ستايل قديم وفخم */
            transition: 0.8s;
        }

        .card:hover { border-color: var(--gold); }
        .card:hover img { 
            filter: grayscale(0%) brightness(1); 
            transform: scale(1.1); 
        }

        .tag {
            position: absolute; bottom: 20px; left: 20px;
            font-size: 10px; letter-spacing: 3px;
            border-left: 2px solid var(--gold);
            padding-left: 10px;
            background: rgba(0,0,0,0.5);
            padding-right: 10px;
        }

        /* Lightbox (نافذة تكبير الصور) */
        .lightbox {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center;
            z-index: 2000;
        }

        .lightbox img {
            max-width: 90%; max-height: 85vh;
            border: 1px solid var(--gold);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .close { 
            position: absolute; top: 30px; right: 40px; 
            font-size: 40px; color: var(--gold); cursor: pointer; 
        }

        .btn-back {
            display: inline-block; margin-bottom: 20px;
            color: var(--gold); text-decoration: none; 
            font-size: 12px; letter-spacing: 2px;
            border: 1px solid var(--gold);
            padding: 10px 20px;
            transition: 0.3s;
        }
        .btn-back:hover { background: var(--gold); color: black; }

        @media (max-width: 600px) {
            header h1 { letter-spacing: 5px; }
        }
    </style>
</head>
<body>

<a href="index.html" class="btn-back">← العودة للرئيسية</a>

<header>
    <h1>ARCHIVE</h1>
    <p>أبرز المشاريع والتصاميم</p>
</header>

<div class="grid">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70" alt="Work 1">
        <div class="tag">AUTOMOTIVE</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb" alt="Work 2">
        <div class="tag">PORTRAITS</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7" alt="Work 3">
        <div class="tag">LUXURY</div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f" alt="Work 4">
        <div class="tag">TECH</div>
    </div>
</div>

<div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLB()">×</span>
    <img id="lbImg" src="">
</div>

<script>
    const lb = document.getElementById("lightbox");
    const lbImg = document.getElementById("lbImg");

    // فتح الصورة عند الضغط عليها
    document.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => {
            lb.style.display = "flex";
            lbImg.src = card.querySelector('img').src;
            document.body.style.overflow = "hidden"; // منع التمرير في الخلفية
        });
    });

    // إغلاق النافذة
    function closeLB() {
        lb.style.display = "none";
        document.body.style.overflow = "auto";
    }

    // إغلاق عند الضغط في أي مكان خارج الصورة
    lb.addEventListener('click', (e) => {
        if(e.target === lb) closeLB();
    });
</script>

</body>
</html>

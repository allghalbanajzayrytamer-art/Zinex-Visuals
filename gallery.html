    <style>
        :root {
            --gold: #d4af37;
            --dark: #050505;
            --black: #000000;
            --gray: #a8a8a8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black); /* أسود خالص للخلفية */
            color: white;
            line-height: 1.6;
            overflow-x: hidden; /* لمنع ظهور شريط التمرير الأفقي */
        }

        nav {
            padding: 30px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            background: var(--black);
            position: relative;
            z-index: 10;
        }

        .logo { 
            color: var(--gold); 
            text-decoration: none;
            font-weight: bold; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
        }

        .gallery-header {
            padding: 100px 10% 60px;
            text-align: center;
            background: linear-gradient(to bottom, var(--black), #080808);
        }

        .gallery-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(35px, 6vw, 60px);
            margin-bottom: 15px;
        }

        /* حاوية المعرض المتحرك */
        .slider-container {
            width: 100%;
            overflow: hidden;
            padding: 40px 0;
            background: #050505;
        }

        .slider-track {
            display: flex;
            gap: 15px;
            /* عرض الحركة: عدد الفيديوهات * عرض الفيديو الواحد + الفجوات */
            width: calc(300px * 10 + 15px * 9); 
            animation: scrollStream 25s linear infinite; /* حركة مستمرة */
        }

        /* تنسيق عنصر الفيديو الواحد */
        .slider-item {
            width: 300px;
            aspect-ratio: 16/9; /* تنسيق سينمائي */
            flex-shrink: 0;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.1);
            transition: 0.5s;
        }

        .slider-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.7); /* تأثير سينمائي غامق */
            transition: 0.5s;
        }

        /* تفعيل الألوان والسطوع عند تمرير الفأرة */
        .slider-item:hover video {
            filter: grayscale(0%) brightness(1);
            transform: scale(1.05);
        }

        /* كود الحركة المستمرة (Seamless Scroll) */
        @keyframes scrollStream {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-300px * 5 - 15px * 5)); } /* التوقف عند نصف عدد العناصر لتكرار الحركة */
        }

        .back-link {
            display: inline-block;
            margin: 60px 0;
            color: var(--gold);
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 5px;
            transition: 0.3s;
        }
        .back-link:hover { color: white; border-color: white; }

        footer {
            padding: 60px;
            text-align: center;
            opacity: 0.3;
            font-size: 10px;
            letter-spacing: 2px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
    </style>
</head>

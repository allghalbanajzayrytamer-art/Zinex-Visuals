<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vision | ZINEX Visuals</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #1a1a1a; --text-gray: #a8a8a8; --fb-blue: #1877F2; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; overflow-x: hidden; line-height: 1.6; }
        
        /* Navigation */
        nav { padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.1); position: sticky; top: 0; background: rgba(5, 5, 5, 0.9); z-index: 1000; backdrop-filter: blur(10px); }
        .logo-img { height: 45px; width: auto; display: block; }

        /* Header */
        .gallery-header { padding: 80px 10% 40px; text-align: center; }
        .gallery-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(32px, 5vw, 55px); margin-bottom: 15px; letter-spacing: 2px; color: white; }
        .separator { width: 50px; height: 1px; background: var(--gold); margin: 20px auto; }

        /* Profile Section */
        .profile-showcase { width: 100%; max-width: 350px; margin: 0 auto 60px; padding: 0 20px; text-align: center; }
        .profile-showcase img { width: 100%; border-radius: 4px; border: 1px solid rgba(212, 175, 55, 0.3); padding: 8px; filter: grayscale(100%); transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .profile-showcase:hover img { filter: grayscale(0%); transform: translateY(-5px); border-color: var(--gold); }

        /* Creative Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 20px 8%; }
        .grid-item { position: relative; overflow: hidden; background: var(--gray); border-radius: 4px; cursor: pointer; height: 400px; border: 1px solid rgba(255,255,255,0.05); }
        
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); filter: brightness(0.6) grayscale(50%); }

        /* Overlay Effect */
        .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 25px; opacity: 0; transition: 0.5s; }
        .grid-item:hover .overlay { opacity: 1; }
        .grid-item:hover img { transform: scale(1.1); filter: brightness(1) grayscale(0%); }
        
        .overlay h3 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.2rem; margin-bottom: 5px; text-align: right; }
        .overlay p { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-gray); text-align: right; }

        /* Call to Action */
        .cta-section { padding: 100px 10%; text-align: center; background: #080808; margin-top: 50px; border-top: 1px solid rgba(212, 175, 55, 0.1); }
        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        
        .btn-premium { display: inline-flex; align-items: center; gap: 10px; padding: 15px 30px; text-decoration: none; font-size: 11px; letter-spacing: 2px; transition: 0.4s; text-transform: uppercase; border-radius: 4px; font-weight: 600; }
        
        .btn-wa { border: 1px solid #25D366; color: #25D366; }
        .btn-wa:hover { background: #25D366; color: white; }
        
        .btn-fb { border: 1px solid var(--fb-blue); color: var(--fb-blue); }
        .btn-fb:hover { background: var(--fb-blue); color: white; }

        .back-link { display: inline-block; margin-top: 40px; color: var(--text-gray); text-decoration: none; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        .back-link:hover { color: var(--gold); letter-spacing: 4px; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; padding: 20px 5%; }
            .grid-item { height: 300px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html">
        <img src="ZINEX LOGO.png" alt="ZINEX Logo" class="logo-img">
    </a>
    <div style="font-weight: 300; font-size: 10px; letter-spacing: 2px; color: var(--gold);">THE VISION 2026</div>
</nav>

<div class="gallery-header">
    <span style="color: var(--gold); letter-spacing: 5px; font-size: 10px; text-transform: uppercase;">Creative Archive</span>
    <h1>الرؤية الإبداعية</h1>
    <div class="separator"></div>
</div>

<div class="profile-showcase">
    <img src="amine-profile.jpg" alt="Amine OV">
    <p style="text-align: center; margin-top: 15px; font-size: 11px; letter-spacing: 3px; color: var(--gold);">AMINE OV</p>
</div>

<div id="youtube-gallery" class="grid">
    <p style="grid-column: 1/-1; text-align: center; opacity: 0.5;">جاري فتح الأرشيف الرقمي...</p>
</div>

<div class="cta-section">
    <h2 style="font-family: 'Playfair Display', serif; font-size: 30px; margin-bottom: 10px;">هل تبحث عن رؤية فنية؟</h2>
    <p style="color: var(--text-gray); font-size: 14px;">تواصل معي لمناقشة مشروعك القادم</p>
    
    <div class="btn-group">
        <a href="https://wa.me/213663190202" target="_blank" class="btn-premium btn-wa">
            <i class="fab fa-whatsapp"></i> WhatsApp
        </a>
        <a href="https://www.facebook.com/share/1B8VoM4pHn/" target="_blank" class="btn-premium btn-fb">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>
    </div>
    
    <a href="index.html" class="back-link">العودة للرئيسية</a>
</div>

<footer style="padding: 60px 40px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05);">
    <p style="opacity: 0.4; font-size: 9px; letter-spacing: 2px;">© 2026 ZINEX STUDIO | CRAFTED BY AMINE OV</p>
</footer>

<script>
    const API_KEY = 'AIzaSyALMuJtd_5zQCji0gVRqHkr2ckiCdngECs';
    const CHANNEL_ID = 'UCY7vL5kIDK_n0v0e4v-G-0Q';

    async function loadGallery() {
        try {
            const response = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=24&type=video`);
            const data = await response.json();
            const container = document.getElementById('youtube-gallery');
            container.innerHTML = '';

            if (data.items) {
                data.items.forEach(item => {
                    const card = `
                        <div class="grid-item" onclick="window.open('https://www.youtube.com/watch?v=${item.id.videoId}', '_blank')">
                            <img src="${item.snippet.thumbnails.high.url}" alt="Work">
                            <div class="overlay">
                                <p>Cinematic Work</p>
                                <h3>${item.snippet.title}</h3>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            }
        } catch (e) {
            console.error(e);
            document.getElementById('youtube-gallery').innerHTML = "<p>تعذر تحميل المعرض حالياً.</p>";
        }
    }
    loadGallery();
</script>

</body>
</html>

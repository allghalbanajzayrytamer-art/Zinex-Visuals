<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ZINEX | Full Gallery</title>
    <style>
        :root { --gold: #d4af37; --black: #050505; }
        body { font-family: sans-serif; background: var(--black); color: white; margin: 0; }
        nav { padding: 20px 6%; display: flex; justify-content: space-between; border-bottom: 1px solid #1a1a1a; }
        .container { padding: 50px 8%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-bottom: 60px; }
        .item { background: #111; height: 350px; overflow: hidden; border: 1px solid #222; cursor: pointer; position: relative; }
        .item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; transition: 0.5s; }
        .item:hover img { opacity: 1; transform: scale(1.05); }
        .section-title { font-size: 30px; color: var(--gold); text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" style="color:var(--gold); text-decoration:none;">العودة للرئيسية</a>
    </nav>

    <div class="container">
        <h2 class="section-title">4K Nature Visuals</h2>
        <div class="grid">
            <div class="item"><img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1200&q=80"></div>
            <div class="item"><img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1200&q=80"></div>
            <div class="item"><img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&w=1200&q=80"></div>
            <div class="item"><img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1200&q=80"></div>
            <div class="item"><img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?auto=format&fit=crop&w=1200&q=80"></div>
        </div>

        <h2 class="section-title">Video Archive</h2>
        <div id="video-grid" class="grid"></div>
    </div>

    <script>
        const API_KEY = 'AIzaSyALMuJtd_5zQCji0gVRqHkr2ckiCdngECs';
        const CHANNEL_ID = 'UCmP8f6_Y6XoDozv8vS_2X_w';
        async function loadVideos() {
            const container = document.getElementById('video-grid');
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=20&type=video`);
            const data = await res.json();
            data.items.forEach(v => {
                container.innerHTML += `
                <div class="item" onclick="window.open('https://www.youtube.com/watch?v=${v.id.videoId}')">
                    <img src="${v.snippet.thumbnails.high.url}">
                    <p style="padding:10px; font-size:12px; text-align:right;">${v.snippet.title}</p>
                </div>`;
            });
        }
        loadVideos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vision | Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #050505; --gray: #a8a8a8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; line-height: 1.6; }
        nav { padding: 15px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.1); background: rgba(5, 5, 5, 0.9); position: sticky; top: 0; z-index: 1000; }
        .logo-img { height: 40px; width: auto; }
        .gallery-header { padding: 80px 10% 40px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px 8%; }
        .grid-item { position: relative; overflow: hidden; background: #111; height: 380px; cursor: pointer; border-radius: 4px; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: 1s; filter: brightness(0.6); }
        .grid-item:hover img { transform: scale(1.1); filter: brightness(1); }
        .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; opacity: 0; transition: 0.5s; }
        .grid-item:hover .overlay { opacity: 1; }
        .cta-section { padding: 80px 10%; text-align: center; background: #080808; border-top: 1px solid rgba(212, 175, 55, 0.1); }
        .btn-wa { border: 1px solid #25D366; color: #25D366; padding: 12px 25px; text-decoration: none; display: inline-block; border-radius: 4px; font-size: 11px; letter-spacing: 2px; }
        footer { padding: 40px; text-align: center; opacity: 0.3; font-size: 9px; }
    </style>
</head>
<body>
<nav>
    <a href="index.html"><img src="logo.png" alt="ZINEX" class="logo-img"></a>
    <a href="index.html" style="color:white; text-decoration:none; font-size:10px; letter-spacing:2px;">الرئيسية</a>
</nav>
<div class="gallery-header">
    <h1 style="font-family: 'Playfair Display', serif; font-size: 45px;">الأرشيف الإبداعي</h1>
    <p style="color: var(--gray);">جميع الفيديوهات والشورتس والمشاريع</p>
</div>
<div id="youtube-gallery" class="grid"><p>جاري سحب المحتوى...</p></div>
<div class="cta-section">
    <h2 style="margin-bottom: 20px;">ابدأ مشروعك الآن</h2>
    <a href="https://wa.me/213663190202" target="_blank" class="btn-wa">تواصل عبر WhatsApp</a>
</div>
<footer>© 2026 ZINEX STUDIO</footer>
<script>
    const API_KEY = 'AIzaSyALMuJtd_5zQCji0gVRqHkr2ckiCdngECs';
    const CHANNEL_ID = 'UCY7vL5kIDK_n0v0e4v-G-0Q';
    async function loadGallery() {
        try {
            const res = await fetch(`https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${CHANNEL_ID}&part=snippet,id&order=date&maxResults=30&type=video`);
            const data = await res.json();
            const container = document.getElementById('youtube-gallery');
            container.innerHTML = '';
            data.items.forEach(item => {
                container.innerHTML += `<div class="grid-item" onclick="window.open('https://www.youtube.com/watch?v=${item.id.videoId}', '_blank')"><img src="${item.snippet.thumbnails.high.url}"><div class="overlay"><h3 style="color:var(--gold); font-size:14px;">${item.snippet.title}</h3></div></div>`;
            });
        } catch (e) { console.error(e); }
    }
    loadGallery();
</script>
</body>
</html>

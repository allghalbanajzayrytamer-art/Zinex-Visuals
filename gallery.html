<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vision | ZINEX Visuals</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --black: #000000; --gray: #a8a8a8; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: white; overflow-x: hidden; }
        
        nav { padding: 30px 6%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .logo { color: var(--gold); text-decoration: none; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; }

        .gallery-header { padding: 60px 10% 20px; text-align: center; }
        .gallery-header h1 { font-family: 'Playfair Display', serif; font-size: 45px; margin-bottom: 10px; letter-spacing: 2px; }

        .profile-showcase {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 40px;
            padding: 0 5%;
        }
        .profile-showcase img {
            width: 100%;
            border: 1px solid var(--gold);
            padding: 5px;
            filter: grayscale(20%);
            transition: 0.8s;
        }
        .profile-showcase img:hover { filter: grayscale(0%); transform: scale(1.02); }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px 10%;
        }

        .grid-item {
            position: relative;
            aspect-ratio: 16/9;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .grid-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.4);
            transition: 0.6s;
        }

        .grid-item:hover video {
            filter: grayscale(0%) brightness(1);
        }

        .back-link { display: inline-block; margin: 40px 0; color: var(--gold); text-decoration: none; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid var(--gold); padding-bottom: 5px; }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">ZINEX</a>
    <div style="font-weight: 300; font-size: 11px; letter-spacing: 2px;">THE VISION</div>
</nav>

<div class="gallery-header">
    <span style="color: var(--gold); letter-spacing: 5px; font-size: 11px;">PERSONAL SHOWCASE</span>
    <h1>الرؤية الإبداعية</h1>
</div>

<div class="profile-showcase">
    <img src="amine-profile.jpg" alt="Amine OV">
</div>

<div class="grid">
    <div class="grid-item"><video autoplay loop muted playsinline><source src="gallery-vid.mp4" type="video/mp4"></video></div>
    <div class="grid-item"><video autoplay loop muted playsinline><source src="gallery-vid.mp4" type="video/mp4"></video></div>
    <div class="grid-item"><video autoplay loop muted playsinline><source src="gallery-vid.mp4" type="video/mp4"></video></div>
    <div class="grid-item"><video autoplay loop muted playsinline><source src="gallery-vid.mp4" type="video/mp4"></video></div>
</div>

<center><a href="index.html" class="back-link">العودة للرئيسية</a></center>

<footer style="padding: 40px; text-align: center; opacity: 0.3; font-size: 9px;">© 2026 ZINEX STUDIO | BY AMINE OV</footer>

</body>
</html>
